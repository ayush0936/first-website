<!DOCTYPE html>
<html lang="en">
    <head>
     <meta charset="UTF-8">
     <title>Ayush technologies - Date Input From</title>
    </head>
    <body>
        <h2>Ayush Technologies -Date Input Form</h2>
        <form>
            <label for="dob1">1.Basic DOB Input:</label><br>
            <input type="date" id="dob1" name="dob1"><br><br>

            <label for="dob2">2.DOB with Age Restriction(18-40 yrs):</label><br>
            <input type="date" id="dob2" name="dob2"
            min="1985-01-01" max="2008-12-31"><br><br>

            <label for="dob3">3.DOB with Default Value:</label><br>
            <input type="date" id="dob3" name="dob3" value="2000-01-01"><br><br>

            <label for="dob4">4. Required Dob (Mandatory Field):</label><br>
            <input type="date" id="dob4" name="dob4" required><br><br>

            <label for="dob5">5. Read-Only DOB (View Only):</label><br>
            <input type="date" id="dob5" name="dob5" value="2004-09-23" readonly><br><br>

            <label for="dob6">6.Disabled DOB (Not Editable):</label><br>
            <input type="date" id="dob6" name="dob" value="1995-12-01" disabled><br><br>
            
            <input type="Submit" value="Submit form">
            <input type="reset" value="Clear form">

            <p>&copy; 2026 Ayush Technologies. All rights reserved</p>


        </form>
    </body>
</html>
