<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, 
        initial-scale=1.0">
        <title>Visitor Gate Pass System</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
        <h1>Welcome to the Visitor Gate Pass System</h1>
        </header>

        <nav>
            <a href="#home">Home</a>
            <a href="#visitor-registration">Visitor Registration</a>
            <a href="#visitor-list">Visitor List</a>
            <a href="#check-in">Check-in</a>
            <a href="#check-out">Check-out</a>
            <input type="text" id="searchBox" placeholder="Search Visitors">
            <button onclick="searchVisitor()">Search</button>
            
        
        </nav>

        <div class="container">
            <h2>Primary Visitor Information</h2>
            <form id="visitorForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="name">
                    </div>
                    <div class="form-group">
                        <label>Visitor ID</label>
                        <input type="text" id="visitor-id">
                    </div>

                    <div class="form-group">
                        <label>Visit Date</label>
                        <input type="date" id="visit-date">
                    </div>

                    <div class="form-group">
                        <label>Purpose of Visit</label>
                        <select id="purpose">
                            <option value="business">Business</option>
                            <option value="meeting">Meeting</option>
                            <option value="conference">Conference</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Gender</label>
                        <select id="gender">
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Contact Number</label>
                        <input type="text" id="contact-number">
                    </div>

                    <div class="form-group">
                        <label>Address</label>
                        <textarea rows="4" id="address"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="age">
                    </div>

                    <div class="form-group">
                        <label>Occupation</label>
                        <input type="text" id="occupation">
                    </div>


                    <div class="form-group">
                        <label>Identification Document</label>
                        <select id="id-document">
                            <option>Select</option>
                            <option value="passport">Passport</option>
                            <option value="national-id">National ID</option>
                            <option value="driver-license">Driver License</option>
                        </select>
                </div>

                <div class="form-group full">
                    <label>Upload Picture</label>
                    <input type="file" id="Photo">
                    <img id="preview" width="120" />
                </div>

                </div>

                <div class="form-group full">
                    <button type="submit">Save Gate Pass</button>
                </div>
                <div class="form-group full">
                    <button type="reset">Reset Form</button>
                    <button onclick="window.print()">Print Gate Pass</button>
                </div>
            </form>
            <div id="output"></div>

        </div>

        <footer>
           <em>Visitor Gate Pass Management System</em>
           <br>
            <em>&copy; 2026 Created by Ayush Mishra</em>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
