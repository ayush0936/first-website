<!DOCTYPE html>
<html lang="en">
    <head>
     <meta charset="UTF-8">
     <title>Ayush technologies - Week task planner</title>
    </head>
    <body>
        <h2>Ayush Technologies -Date Input Form</h2>
        <form>
            <label for="Week1">1.Select Any Week:</label><br>
            <input type="Week" id="Week1" name="Week1"><br><br>

            <label for="Week2">2.Pre-filled (e.g.,2026-W12):</label><br>
            <input type="Week" id="Week2" name="Week2"value="2026-W12"><br><br>

            <label for="Week3">3.Week Between 2025-W01 and 2025-W25:</label><br>
            <input type="Week" id="Week3" name="Week3" min="2025-W01" max="2025-W25"><br><br>

            <label for="Week4">4. Required Week Filed:</label><br>
            <input type="Week" id="Week4" name="Week4" required><br><br>

            <label for="Week5">5. Read-Only Week (Fixed):</label><br>
            <input type="Week" id="Week5" name="Week5" value="2025-W30" readonly><br><br>

            <label for="Week6">6.Disabled Week Field:</label><br>
            <input type="Week" id="Week6" name="Week6" value="2024-W40" disabled><br><br>
            
            <input type="Submit" value="Submit form">
            <input type="reset" value="Clear form">

            <p>&copy; 2026 Ayush Technologies. All rights reserved</p>


        </form>
    </body>
</html>
