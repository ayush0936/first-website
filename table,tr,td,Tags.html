<!DOCTYPE html>
<html>
    <head>
        <title>Table, TR, TD Tags</title>
    </head>
    <body>
        <h1>Ayush Technologies Private Limited</h1>
        <p>This document provides examples of using table, tr, and td tags in HTML.</p>

        <h2>Table Example</h2>
        <table border="18">
                <tr>
                    <td>Ayush Mishra</td>
                    <td>22</td>
                    <td>Ghaziabad</td>
                </tr>
                <tr>
                    <td>Deepak</td>
                    <td>22</td>

                </tr>
            </tbody>
        </table>
    </body>
</html>
