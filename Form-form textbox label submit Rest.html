<!DOCTYPE html>
<HTML>
    <head>
        <title>html form elements</title>
    </head>
    <body>
        <form>
            <h1>Created by Ayush Kumar Mishra</h1>
            <br>
            <br>
            <label for="fname">First Name</label>
            <input type="text" placeholder="Enter The First Name" name="firstname" id="fname" /> <br><br>
            <label for="lname">Last Name</label>
            <input type="text " placeholder="Enter The Last Name" name="lastname" if="lname" />
            <br><br>
            <input type="reset" value="Cancel" />
            <input type="submit" value="Save"  />
        </form>
    </body>
</HTML>
