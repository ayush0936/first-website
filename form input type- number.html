<!DOCTYPE html>
<html lang="en">
    <head>
     <meta charset="UTF-8">
     <title>Ayush technologies - Date Input From</title>
    </head>
    <body>
        <h2>Ayush Technologies -Date Input Form</h2>
        <form>
            <label for="exp1">1. Enter experience(any number):</label><br>
            <input type="number" id="exp1" name="exp1"><br><br>

            <label for="exp2">2. experience between 0 and 40 years:</label><br>
            <input type="number" id="exp2" name="exp2"
            min="0" max="40"><br><br>

            <label for="exp3">3. experience  value(3 years):</label><br>
            <input type="number" id="exp3" name="exp3" value="2000-01-01"><br><br>

            <label for="exp4">4. Required experience Field :</label><br>
            <input type="number" id="exp4" name="exp4" required><br><br>

            <label for="exp5">5. experience in decimal(step = 0.5):</label><br>
            <input type="number" id="exp5" name="exp5" step="0.5" > <br><br>

            <label for="exp6">6.read-only experience:</label><br>
            <input type="number" id="exp6" name="exp6" value="10" readonly><br><br>

            <label for="exp7">7.Disabled DOB (Not Editable):</label><br>
            <input type="number" id="exp7" name="exp7" value="6" disabled><br><br>

                        <label for="exp8">8.Disabled DOB (Not Editable):</label><br>
            <input type="number" id="exp8" name="exp8" value="6" min="6" max="20" required><br><br>
            
            <input type="Submit" value="Submit form">
            <input type="reset" value="Clear form">

            <p>&copy; 2026 Ayush Technologies. All rights reserved</p>


        </form>
    </body>
</html>
