<!DOCTYPE html>
<html lang="en">
    <head>
     <meta charset="UTF-8">
     <title>Ayush technologies - Date Input From</title>
    </head>
    <body>
        <h2>Ayush Technologies -Date Input Form</h2>
        <form>
            <label for="Month1">1.Basic Month Input:</label><br>
            <input type="Month" id="Month1" name="Month1"><br><br>

            <label for="Month2">2.Allowed Month : jan2025-dec2026</label><br>
            <input type="Month" id="Month2" name="Month2"
            min="2024-01" max="2026-12"><br><br>

            <label for="Month3">3. Default Value(Pre Filled):</label><br>
            <input type="Month" id="Month3" name="Month3" value="2025-08"><br><br>

            <label for="Month4">4. Required Month (Cannot submit empty):</label><br>
            <input type="Month" id="Month4" name="Month4" required><br><br>

            <label for="Month5">5. Read-Only Month (Visible but non-editable):</label><br>
            <input type="Month" id="Month5" name="Month5" value="2024-06" readonly><br><br>

            <label for="Month6">6.Disabled Month (Grayed Out):</label><br>
            <input type="Month" id="Month6" name="Month6" value="2023-11" disabled><br><br>
            
            <input type="Submit" value="Submit form">
            <input type="reset" value="Clear form">

            <p>&copy; 2026 Ayush Technologies. All rights reserved</p>


        </form>
    </body>
</html>
